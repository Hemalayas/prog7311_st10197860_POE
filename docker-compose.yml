version: "3.9"

networks:
  glms-network:
    driver: bridge

volumes:
  sqldata:

services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "TechMove@2026!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - glms-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P TechMove@2026! -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  glms-backend-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      sql-server-db:
        condition: service_healthy
    ports:
      - "5001:5001"
    environment:
      ConnectionStrings__DefaultConnection: "Server=sql-server-db,1433;Database=TechMoveGLMS;User Id=sa;Password=TechMove@2026!;TrustServerCertificate=True"
      Jwt__Key: "TechMoveGLMS-SuperSecret-Key-2026!"
    restart: on-failure
    networks:
      - glms-network

  glms-frontend-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - glms-backend-api
    ports:
      - "5000:5000"
    environment:
      ApiBaseUrl: "http://glms-backend-api:5001"
    restart: on-failure
    networks:
      - glms-network
